<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="kanban__container">
        <h3 class="kanban_head">Канбан-доска</h3>
        <div class="kanban__search__add">
            <input id="searchInput" placeholder="Поиск задачи" type="text">
            <div class="kanban__tab" data-filter="all">Все</div>
            <div class="kanban__tab" data-filter="no-description">Без описания</div>
            <div class="kanban__tab" data-filter="large">Обьемные</div>
            <button class="add_task_button">Добавить задачу</button>
        </div>
        <div class="undo-redo-buttons">
            <button id="undoBtn" class="undo-btn" title="Нечего отменять" disabled>
                <i class="fas fa-undo"></i> Отменить
            </button>
            <button id="redoBtn" class="redo-btn" title="Нечего повторять" disabled>
                <i class="fas fa-redo"></i> Повторить
            </button>
        </div>
        <div class="kanban__columns">
            <div class="kanban__column" data-status="todo">
                <h3 class="kanban__column__head">ToDo</h3>
                <div class="kanban__column__line"></div>
                <div class="kanban__column_tasks"></div>
            </div>
            <div class="kanban__column" data-status="in-progress">
                <h3 class="kanban__column__head" >In Progress</h3>
                <div class="kanban__column__line"></div>
                <div class="kanban__column_tasks"></div>
            </div>
            <div class="kanban__column" data-status="done">
                <h3 class="kanban__column__head" >Done</h3>
                <div class="kanban__column__line"></div>
                <div class="kanban__column_tasks"></div>
            </div>
        </div>
    </div>

    <div id="router-outlet"></div>
        <!-- Модальное окно для создания задачи -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h3 id="modal-title">Создать новую задачу</h3>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label  for="taskTitle">Заголовок</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Описание</label>
                    <textarea id="taskDescription"></textarea>
                    <div class="formatting-hint">
                        Поддерживается разметка: **жирный**, _курсив_, `код`
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="close-btn" style="display: none;" id="closeModalBtn">Закрыть</button>
                    <button type="button" class="cancel-btn" id="cancelBtn">Отмена</button>
                    <button type="submit" class="save-btn">Сохранить</button>
                    <button type="submit" class="update-btn">Обновить</button>
                </div>
            </form>
        </div>
    </div>
</body>
    <script type="module" src="index.js"></script>
    <!-- <script type="module" src="components/store.js"></script> -->
</html>
